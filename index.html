                tab.innerHTML = `<span class="truncate">${t.title}</span> <div class="browser-tab-close" onclick="event.stopPropagation(); OS.Apps._bCloseTab('${winId}', '${t.id}')"><i class="fas fa-times text-[10px]"></i></div>`;
                tab.onclick = () => { state.activeTab = t.id; OS.Apps._bRenderTabs(winId); };
                tContainer.appendChild(tab);

                let frame = document.getElementById(`${winId}_frame_${t.id}`);
                if(!frame) {
                    frame = document.createElement('iframe');
                    frame.id = `${winId}_frame_${t.id}`;
                    frame.className = 'w-full h-full border-none absolute top-0 left-0 bg-white';
                    frame.src = t.url;
                    frame.sandbox = "allow-same-origin allow-scripts allow-forms allow-popups";
                    fContainer.appendChild(frame);
                }
                frame.style.display = (state.activeTab === t.id) ? 'block' : 'none';
                
                if(state.activeTab === t.id) {
                    document.getElementById(`${winId}_url`).value = t.url;
                }
            });

            const newTabBtn = document.createElement('div');
            newTabBtn.className = 'browser-tab cursor-pointer hover:bg-gray-300';

        _bNewTab(winId) {

            state.tabs.push({ id: nId, url: 'https://www.google.com/webhp?igu=1', title: 'New Tab' });
            state.activeTab = nId; this._bRenderTabs(winId);
        },
        _bCloseTab(winId, tabId) {
            const state = OS.Apps.browserStates[winId];
            if(state.tabs.length <= 1) return OS.WM.close(winId); 
            state.tabs = state.tabs.filter(t => t.id !== tabId);
            document.getElementById(`${winId}_frame_${tabId}`).remove();
            if(state.activeTab === tabId) state.activeTab = state.tabs[state.tabs.length-1].id;
            this._bRenderTabs(winId);
        },
        _bNav(winId, url) {
            let cleanUrl = url.trim(); if(!cleanUrl.startsWith('http')) cleanUrl = 'https://' + cleanUrl;
            const state = OS.Apps.browserStates[winId];
            const tab = state.tabs.find(t => t.id === state.activeTab);
            tab.url = cleanUrl; tab.title = cleanUrl.replace('https://','').split('/')[0]; 
            document.getElementById(`${winId}_frame_${state.activeTab}`).src = cleanUrl;
            this._bRenderTabs(winId);
        },
        _bRefresh(winId) {
            const state = OS.Apps.browserStates[winId];
            const frame = document.getElementById(`${winId}_frame_${state.activeTab}`); frame.src = frame.src; 
        },
        _bBack(winId) {
            const state = OS.Apps.browserStates[winId];
            document.getElementById(`${winId}_frame_${state.activeTab}`).contentWindow.history.back();
        },

        // 🔴 SCREEN RECORDER APP
        screenRecStates: {},
        renderScreenRecorder(winId) {
            OS.Apps.screenRecStates[winId] = { stream: null, recorder: null, chunks: [], isRecording: false, timer: null, seconds: 0 };
            
            const html = `
                <div class="flex flex-col h-full bg-gray-900 text-white">
                    <div class="p-4 bg-gray-800 border-b border-gray-700 flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <button id="${winId}_btn" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded font-bold shadow flex items-center gap-2 transition-colors" onclick="OS.Apps._toggleScreenRecord('${winId}')">
                                <i class="fas fa-circle"></i> Start Recording
                            </button>
                            <div class="flex items-center gap-2 text-sm bg-gray-700 px-3 py-1.5 rounded cursor-pointer" onclick="document.getElementById('${winId}_mic').click()">
                                <input type="checkbox" id="${winId}_mic" class="cursor-pointer w-4 h-4" onclick="event.stopPropagation()">

                    </div>
                    <div class="flex-1 p-4 flex items-center justify-center relative bg-black">
                        <video id="${winId}_preview" class="max-w-full max-h-full border border-gray-700 rounded bg-gray-900 shadow-2xl" autoplay muted playsinline></video>
                        <div id="${winId}_overlay" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                            <i class="fas fa-desktop text-6xl text-gray-600 mb-4"></i>
                            <span class="text-gray-500 text-lg font-bold">Ready to Record Screen</span>
                        </div>
                    </div>
                </div>
            `;
            return { width: 700, height: 500, html: html, onLoad: (win) => {
                const observer = new MutationObserver(() => {
                    if(!document.contains(win)) { OS.Apps._stopScreenRecordForce(winId); observer.disconnect(); }
                }); observer.observe(document.body, {childList: true, subtree: true});
            }};
        },
        async _toggleScreenRecord(winId) {
            const state = OS.Apps.screenRecStates[winId];
            const btn = document.getElementById(`${winId}_btn`);
            const timerDisplay = document.getElementById(`${winId}_time`);
            const preview = document.getElementById(`${winId}_preview`);
            const overlay = document.getElementById(`${winId}_overlay`);
            const useMic = document.getElementById(`${winId}_mic`).checked;

            if (state.isRecording) { state.recorder.stop(); return; }

            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
                    await OS.UI.showModal({type: 'alert', title: 'Not Supported', text: 'Screen recording is not supported in this browser environment.'});
                    return;
                }
                const displayStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true }).catch(async (err) => {
                    return await navigator.mediaDevices.getDisplayMedia({ video: true });
                });
                
                let finalStream = new MediaStream([displayStream.getVideoTracks()[0]]);
                let audioCtx = null;

                const systemAudio = displayStream.getAudioTracks()[0];
                let micStream = null; let micAudio = null;

                if (useMic) {
                    try {
                        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        micAudio = micStream.getAudioTracks()[0];
                    } catch(err) { await OS.UI.showModal({type: 'alert', title: 'Mic Error', text: 'Could not access microphone.'}); }
                }

                if (systemAudio && micAudio) {
                    audioCtx = new AudioContext();
                    const dest = audioCtx.createMediaStreamDestination();
                    audioCtx.createMediaStreamSource(new MediaStream([systemAudio])).connect(dest);
                    audioCtx.createMediaStreamSource(new MediaStream([micAudio])).connect(dest);
                    finalStream.addTrack(dest.stream.getAudioTracks()[0]);
                } else if (systemAudio) { finalStream.addTrack(systemAudio); } 
                else if (micAudio) { finalStream.addTrack(micAudio); }

                preview.srcObject = displayStream; 
                overlay.style.display = 'none';

                state.stream = finalStream; state.chunks = [];
                state.recorder = new MediaRecorder(finalStream, { mimeType: 'video/webm' });
                state.recorder.ondataavailable = e => { if(e.data.size > 0) state.chunks.push(e.data); };
                
                state.recorder.onstop = async () => {
                    clearInterval(state.timer); state.isRecording = false;
                    btn.innerHTML = '<i class="fas fa-circle"></i> Start Recording';
                    btn.className = 'bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded font-bold shadow flex items-center gap-2 transition-colors';
                    
                    displayStream.getTracks().forEach(t => t.stop());
                    if (micStream) micStream.getTracks().forEach(t => t.stop());
                    if (audioCtx) audioCtx.close();
                    preview.srcObject = null; overlay.style.display = 'flex';

                    if(state.chunks.length > 0) {
                        const blob = new Blob(state.chunks, { type: 'video/webm' });
                        const name = `ScreenRecord_${Date.now()}.webm`;
                        await NexusDB.put('files', { path: `/Users/${OS.state.user}/Videos/${name}`, name: name, type: 'file', parent: `/Users/${OS.state.user}/Videos`, owner: OS.state.user, data: blob, mime: 'video/webm' });
                        OS.notify('Recording Saved', `Saved as ${name} to Videos.`, 'fas fa-video');
                        Utils.playAudio('startup');
                    }
                };

                displayStream.getVideoTracks()[0].onended = () => { if (state.isRecording) state.recorder.stop(); };

                state.recorder.start(); state.isRecording = true; state.seconds = 0; timerDisplay.innerText = "00:00";
                state.timer = setInterval(() => {
                    state.seconds++;
                    const m = String(Math.floor(state.seconds / 60)).padStart(2, '0');
                    const s = String(state.seconds % 60).padStart(2, '0');
                    timerDisplay.innerText = `${m}:${s}`;
                }, 1000);

                btn.innerHTML = '<i class="fas fa-square text-red-500"></i> Stop Recording';
                btn.className = 'bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded font-bold shadow flex items-center gap-2 transition-colors border border-gray-600';
                Utils.playAudio('camera');

            } catch(e) {
                console.error("Screen Rec Error", e);
                OS.UI.showModal({
                    type: 'alert', 
                    title: 'Screen Recording Blocked', 
                    text: 'Screen recording permission was denied or is blocked by the current environment. If you are running this inside a preview window, it likely lacks the necessary "display-capture" permissions. Try opening the HTML file directly in a new browser tab.'
                });
            }
        },
        _stopScreenRecordForce(winId) {
            const state = OS.Apps.screenRecStates && OS.Apps.screenRecStates[winId];
            if(state && state.isRecording) state.recorder.stop();
        },

        renderSettings(winId) {

                        <div class="font-bold mb-2 uppercase text-gray-500">Settings</div>
                        <button class="text-left px-2 py-1 bg-blue-100 rounded text-blue-800" onclick="OS.Apps._switchSettingsView('${winId}', 'wp')">Appearance</button>
                        <button class="text-left px-2 py-1 hover:bg-gray-200 rounded text-gray-800" onclick="OS.Apps._switchSettingsView('${winId}', 'account')">Account</button>
                        <button class="text-left px-2 py-1 hover:bg-gray-200 rounded text-gray-800" onclick="OS.Apps._switchSettingsView('${winId}', 'ai')">AI Assistant</button>
                        <button class="text-left px-2 py-1 hover:bg-gray-200 rounded text-gray-800" onclick="OS.Apps._switchSettingsView('${winId}', 'apps'); OS.Apps._renderUninstallList('${winId}');">Manage Apps</button>
                    </div>
                    <div class="flex-1 p-6 overflow-y-auto relative">
                        <div id="${winId}_v_wp" class="settings-view">
                            <h3 class="font-light text-2xl mb-4 border-b border-gray-300 pb-2">Appearance</h3>
                            <h4 class="font-bold mb-2">Desktop Background</h4>
                            <div class="grid grid-cols-3 gap-4 mb-4">
                                ${[
                                    'https://upload.wikimedia.org/wikipedia/commons/e/e5/Windows_7_default_login_background.jpg', 
                                    'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2670&auto=format&fit=crop',
                                    'https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?q=80&w=2574&auto=format&fit=crop',
                                    'https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2672&auto=format&fit=crop'
                                ].map(url => `
                                    <div class="border-2 border-transparent hover:border-blue-500 cursor-pointer rounded overflow-hidden" onclick="OS.Apps._changeWallpaper('${url}')"><img src="${url}" class="w-full h-20 object-cover"></div>
                                `).join('')}
                            </div>
                            <div class="mb-4">
                                <label class="font-bold block mb-2 text-sm">Upload Custom Image:</label>
                                <input type="file" accept="image/*" class="text-sm" onchange="OS.Apps._uploadWallpaper(this)">
                            </div>
                        </div>

                        <div id="${winId}_v_account" class="settings-view" style="display:none;">
                            <h3 class="font-light text-2xl mb-4 border-b border-gray-300 pb-2">Account Settings</h3>
                            <div class="flex gap-6 items-start mb-6">
                                <div class="flex flex-col items-center">
                                    <div id="${winId}_acc_avatar" class="w-24 h-24 bg-gray-200 border-2 border-gray-400 rounded flex items-center justify-center text-4xl text-gray-500 mb-2 overflow-hidden bg-cover bg-center"><i class="fas fa-user"></i></div>
                                    <button class="bg-gray-200 hover:bg-gray-300 px-3 py-1 text-xs rounded border border-gray-400" onclick="document.getElementById('${winId}_acc_file').click()">Change Avatar</button>
                                    <input type="file" id="${winId}_acc_file" accept="image/*" style="display:none" onchange="OS.Apps._changeAccountAvatar(this, '${winId}')">
                                </div>
                                <div class="flex-1 flex flex-col gap-3">
                                    <div>
                                        <label class="text-sm font-bold block mb-1">Display Name</label>
                                        <div class="flex gap-2">
                                            <input type="text" id="${winId}_acc_name" class="border p-2 rounded w-full flex-1" value="${OS.state.user}">
                                            <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm shadow whitespace-nowrap" onclick="OS.Apps._changeAccountName('${winId}')">Rename</button>
                                        </div>
                                    </div>
                                    <div>
                                        <label class="text-sm font-bold block mb-1">New Password</label>
                                        <div class="flex gap-2">
                                            <input type="password" id="${winId}_acc_pass" class="border p-2 rounded w-full flex-1">
                                            <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm shadow whitespace-nowrap" onclick="OS.Apps._changeAccountPassword('${winId}')">Update Password</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="border-t border-gray-300 pt-4 mt-auto">
                                <h4 class="font-bold text-red-600 mb-2">Danger Zone</h4>
                                <button class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded text-sm shadow" onclick="OS.Apps._deleteAccount('${winId}')">Delete Account</button>
                            </div>
                        </div>

                        <div id="${winId}_v_ai" class="settings-view" style="display:none;">
                            <h3 class="font-light text-2xl mb-4 border-b border-gray-300 pb-2">AI Assistant Settings</h3>
                            <div class="mb-4">
                                <label class="font-bold block mb-2 text-sm">AI Name:</label>
                                <input type="text" id="${winId}_ai_name" class="border p-2 rounded w-full outline-none focus:border-blue-500" value="${OS.state.aiName}">
                            </div>
                            <div class="mb-6">
                                <label class="font-bold block mb-2 text-sm">Orb Base Color:</label>
                                <input type="color" id="${winId}_ai_color" value="${OS.state.aiColor}" class="w-16 h-10 p-1 border rounded cursor-pointer outline-none">
                            </div>
                            <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm shadow" onclick="OS.Apps._saveAISettings('${winId}')">Save AI Settings</button>
                        </div>

                        <div id="${winId}_v_apps" class="settings-view" style="display:none;">
                            <h3 class="font-light text-2xl mb-4 border-b border-gray-300 pb-2">Uninstall Web Apps</h3>
                            <div id="${winId}_uninstall_list" class="flex flex-col gap-2"></div>
                        </div>
                    </div>
                </div>
            `;
            return { 
                width: 700, height: 500, html: html,
                onLoad: async (win) => {
                    const user = await NexusDB.get('users', OS.state.user);
                    if(user && user.avatar) {
                        const avatarBox = document.getElementById(`${winId}_acc_avatar`);
                        avatarBox.innerHTML = ''; avatarBox.style.backgroundImage = `url('${user.avatar}')`;
                    }
                }
            };
        },
        _switchSettingsView(winId, view) {
            const buttons = document.getElementById(winId).querySelectorAll('.w-48 button');
            buttons.forEach(btn => { btn.classList.remove('bg-blue-100', 'text-blue-800'); btn.classList.add('hover:bg-gray-200', 'text-gray-800'); });
            event.target.classList.add('bg-blue-100', 'text-blue-800'); event.target.classList.remove('hover:bg-gray-200', 'text-gray-800');
            document.querySelectorAll(`#${winId} .settings-view`).forEach(v => v.style.display = 'none');
            document.getElementById(`${winId}_v_${view}`).style.display = 'block';
        },
        async _changeAccountName(winId) {
            const newName = document.getElementById(`${winId}_acc_name`).value.trim();
            if(!newName || newName === OS.state.user) return;
            
            const existing = await NexusDB.get('users', newName);
            if(existing) { await OS.UI.showModal({type: 'alert', title: 'Error', text: 'Username already taken.'}); return; }
            
            const conf = await OS.UI.showModal({type: 'confirm', title: 'Rename Account', text: `Are you sure you want to rename your account to ${newName}? The OS will restart to apply changes.`});
            if(!conf) return;

            const oldName = OS.state.user;
            
            const user = await NexusDB.get('users', oldName);
            user.username = newName;
            await NexusDB.put('users', user);
            await NexusDB.delete('users', oldName);
            
            const settings = await NexusDB.get('settings', oldName);
            if(settings) {
                settings.username = newName;
                await NexusDB.put('settings', settings);
                await NexusDB.delete('settings', oldName);
            }
            
            const apps = await NexusDB.getAll('apps');
            for(let app of apps) {
                if(app.owner === oldName) {
                    app.owner = newName;
                    await NexusDB.put('apps', app);
                }
            }
            
            const files = await NexusDB.getAll('files');
            for(let f of files) {
                if(f.owner === oldName) {
                    const oldPath = f.path;
                    f.owner = newName;
                    f.path = f.path.replace(`/Users/${oldName}`, `/Users/${newName}`);
                    f.parent = f.parent.replace(`/Users/${oldName}`, `/Users/${newName}`);
                    await NexusDB.put('files', f);
                    await NexusDB.delete('files', oldPath);
                }
            }
            
            OS.Auth.logout();
        },
        async _deleteAccount(winId) {
            const conf1 = await OS.UI.showModal({type: 'confirm', title: 'Delete Account', text: 'Are you sure you want to completely delete this account? All files, apps, and settings will be permanently lost!'});
            if(!conf1) return;
            
            const oldName = OS.state.user;
            await NexusDB.delete('users', oldName);
            await NexusDB.delete('settings', oldName);
            
            const apps = await NexusDB.getAll('apps');
            for(let app of apps) { if(app.owner === oldName) await NexusDB.delete('apps', app.id); }
            
            const files = await NexusDB.getAll('files');
            for(let f of files) { if(f.owner === oldName) await NexusDB.delete('files', f.path); }
            
            OS.Auth.logout();
        },
        async _saveAISettings(winId) {
            const name = document.getElementById(`${winId}_ai_name`).value.trim() || 'Nexus';
            const color = document.getElementById(`${winId}_ai_color`).value;
            
            let settings = await NexusDB.get('settings', OS.state.user);
            settings.aiName = name; settings.aiColor = color; await NexusDB.put('settings', settings);
            
            OS.state.aiName = name; OS.state.aiColor = color; OS.UI.applyAIColor(color);
            OS.state.installedApps['aichat'].name = `${name} AI Chat`;
            document.getElementById('ai-container').title = `${name} Voice AI (Click to Listen)`;
            
            OS.UI.renderDesktopIcons(settings.desktopPins); OS.UI.renderStartMenuApps();
            OS.notify('Settings Saved', 'AI preferences updated.', 'fas fa-check');
        },
        async _changeAccountAvatar(input, winId) {
            const file = input.files[0]; if(!file) return; const reader = new FileReader();
            reader.onload = async (e) => {
                const dataUrl = e.target.result;
                const avatarBox = document.getElementById(`${winId}_acc_avatar`);
                avatarBox.innerHTML = ''; avatarBox.style.backgroundImage = `url('${dataUrl}')`;
                const user = await NexusDB.get('users', OS.state.user); user.avatar = dataUrl; await NexusDB.put('users', user);
                document.getElementById('start-avatar').innerHTML = ''; document.getElementById('start-avatar').style.backgroundImage = `url('${dataUrl}')`;
                OS.notify('Settings Saved', 'Avatar updated successfully.', 'fas fa-check');
            }; reader.readAsDataURL(file);
        },
        async _changeAccountPassword(winId) {
            const pass = document.getElementById(`${winId}_acc_pass`).value; 
            if(!pass) { await OS.UI.showModal({type: 'alert', title: 'Error', text: 'Enter a new password.'}); return; }
            
            const hash = await Utils.hashPassword(pass); const user = await NexusDB.get('users', OS.state.user);
            user.hash = hash; await NexusDB.put('users', user);
            document.getElementById(`${winId}_acc_pass`).value = ''; OS.notify('Settings Saved', 'Password updated successfully.', 'fas fa-check');
        },
        async _changeWallpaper(url) {
            document.getElementById('desktop').style.backgroundImage = `url('${url}')`;
            let settings = await NexusDB.get('settings', OS.state.user); settings.wallpaper = url; await NexusDB.put('settings', settings);
        },
        _uploadWallpaper(inputElem) {
            const file = inputElem.files[0]; if(!file) return; const reader = new FileReader();
            reader.onload = (e) => { OS.Apps._changeWallpaper(e.target.result); }; reader.readAsDataURL(file); 
        },
        async _renderUninstallList(winId) {
            const list = document.getElementById(`${winId}_uninstall_list`); const customApps = await NexusDB.getAll('apps');
            const userApps = customApps.filter(app => app.owner === OS.state.user);
            
            list.innerHTML = userApps.length ? '' : '<p class="text-gray-500 text-sm">No custom web apps installed.</p>';
            userApps.forEach(app => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center p-3 border border-gray-300 rounded shadow-sm bg-gray-50';
                const iconHTML = (app.icon.startsWith('http') || app.icon.startsWith('data:')) ? `<img src="${app.icon}" class="w-6 h-6 object-cover rounded">` : `<i class="${app.icon} text-xl text-blue-500"></i>`;
                div.innerHTML = `<div class="flex items-center gap-3">${iconHTML} <b>${app.name}</b></div><button class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm" onclick="OS.Apps._uninstallApp('${app.id}'); OS.Apps._renderUninstallList('${winId}')">Uninstall</button>`;
                list.appendChild(div);
            });
        },
        async _uninstallApp(appId) {
            const conf = await OS.UI.showModal({type: 'confirm', title: 'Uninstall', text: 'Uninstall this application?'});
            if(!conf) return;
            
            await NexusDB.delete('apps', appId);
            let settings = await NexusDB.get('settings', OS.state.user);
            settings.desktopPins = settings.desktopPins.filter(id => id !== appId);
            settings.pinnedTaskbar = settings.pinnedTaskbar.filter(id => id !== appId);
            if(settings.desktopIconPositions && settings.desktopIconPositions[appId]) delete settings.desktopIconPositions[appId];
            await NexusDB.put('settings', settings);
            delete OS.state.installedApps[appId];
            OS.UI.renderDesktopIcons(settings.desktopPins); OS.UI.renderTaskbarPins(settings.pinnedTaskbar); OS.UI.renderStartMenuApps(); OS.WM.updateTaskbar();
            OS.notify('App Removed', 'Application has been successfully uninstalled.', 'fas fa-trash');
        },

        pendingInstallerIcon: null,
        renderInstaller(winId) {
            OS.Apps.pendingInstallerIcon = null; 
            const html = `
                <div class="p-6 h-full flex flex-col bg-white">
                    <h2 class="text-2xl font-light mb-2"><i class="fas fa-globe text-blue-500 mr-2"></i>Web App Installer</h2>
                    <p class="text-gray-500 text-sm mb-6">Install any website as a local desktop window.</p>
                    <div class="flex flex-col gap-4">
                        <div><label class="text-sm font-bold block mb-1">App Name</label><input type="text" id="${winId}_appName" class="w-full border border-gray-300 p-2 rounded" placeholder="e.g. Canva"></div>
                        <div><label class="text-sm font-bold block mb-1">Website URL</label><input type="text" id="${winId}_appUrl" class="w-full border border-gray-300 p-2 rounded" placeholder="https://canva.com"></div>
                        <div>
                            <label class="text-sm font-bold block mb-1">Custom Icon (Optional)</label>
                            <div class="flex items-center gap-3">
                                <div id="${winId}_iconPreview" class="w-10 h-10 bg-gray-200 border rounded flex justify-center items-center text-gray-500 overflow-hidden bg-cover bg-center"><i class="fas fa-window-maximize"></i></div>
                                <button class="bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded text-sm border border-gray-300" onclick="document.getElementById('${winId}_iconUpload').click()">Upload Icon</button>
                                <input type="file" id="${winId}_iconUpload" accept="image/*" style="display:none" onchange="OS.Apps._handleInstallerIcon(this, '${winId}')">
                            </div>
                        </div>
                        <div class="mt-4 flex justify-end"><button class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded shadow" onclick="OS.Apps._installApp('${winId}')">Install</button></div>
                    </div>
                </div>
            `;
            return { width: 450, height: 450, html: html };
        },
        _handleInstallerIcon(input, winId) {
            const file = input.files[0]; if(!file) return; const reader = new FileReader();
            reader.onload = (e) => {
                OS.Apps.pendingInstallerIcon = e.target.result;
                const prev = document.getElementById(`${winId}_iconPreview`);
                prev.innerHTML = ''; prev.style.backgroundImage = `url('${e.target.result}')`;
            }; reader.readAsDataURL(file);
        },
        async _installApp(winId) {
            const name = document.getElementById(`${winId}_appName`).value.trim();
            let url = document.getElementById(`${winId}_appUrl`).value.trim();
            if(!name || !url) { await OS.UI.showModal({type: 'alert', title: 'Error', text: 'Name and URL required.'}); return; }
            if(!url.startsWith('http')) url = 'https://' + url;

            const appId = 'app_' + Utils.generateId();
            const iconToUse = OS.Apps.pendingInstallerIcon || 'fas fa-window-maximize';
            
            const appData = { id: appId, name, url, icon: iconToUse, type: 'iframe', system: false, owner: OS.state.user };
            await NexusDB.put('apps', appData);
            
            const settings = await NexusDB.get('settings', OS.state.user);
            if(!settings.desktopPins.includes(appId)) settings.desktopPins.push(appId);
            await NexusDB.put('settings', settings);

            OS.state.installedApps[appId] = appData;
            OS.UI.renderDesktopIcons(settings.desktopPins); OS.UI.renderStartMenuApps();
            OS.notify('App Installed', `${name} is ready.`, 'fas fa-check-circle'); OS.WM.close(winId);
        }
    };

    // --- 8. AI VOICE SYSTEM ---
    OS.AI = {
        isListening: false, recognition: null, synth: window.speechSynthesis,
        init() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
                this.recognition = new SpeechRec(); this.recognition.continuous = false;
                this.recognition.onstart = () => { this.isListening = true; document.getElementById('ai-container').classList.add('ai-listening'); Utils.playAudio('blip'); };
                this.recognition.onresult = (e) => this.processCommand(e.results[0][0].transcript);
                this.recognition.onerror = (e) => { 
                    if(e.error === 'not-allowed') {
                        OS.UI.showModal({type: 'alert', title: 'Mic Blocked', text: 'Microphone access is blocked in this environment. Please allow microphone permissions or open in a full tab.'});
                    }
                    this.stopListening(); 
                };
                this.recognition.onend = () => this.stopListening();
            }
        },
        toggleListen() {
            if(!this.recognition) return OS.UI.showModal({type: 'alert', title: 'Error', text: 'Speech Recognition not supported in this browser.'});
            this.isListening ? this.recognition.stop() : this.recognition.start();
        },
        stopListening() { this.isListening = false; document.getElementById('ai-container').classList.remove('ai-listening'); },
        speak(text) {
            if(!this.synth) return;
            const u = new SpeechSynthesisUtterance(text); u.pitch = 1.1; u.rate = 1.0; this.synth.speak(u);
        },
        async processCommand(text) {
            OS.notify('Heard Command', `"${text}"`, 'fas fa-microphone');
            const lower = text.toLowerCase();
            if (lower.includes('browser')) { OS.WM.openApp('browser'); this.speak("Opening browser."); }
            else if (lower.includes('explorer')) { OS.WM.openApp('explorer'); this.speak("Opening files."); }
            else if (lower.includes('settings')) { OS.WM.openApp('settings'); this.speak("Opening settings."); }
            else if (lower.includes('shut down') || lower.includes('log out')) { this.speak("Logging off."); setTimeout(() => OS.Auth.logout(), 1000); }
            else { this.queryPuter(text); }
        },
        async queryPuter(text) {
             this.speak("Thinking...");
             try {
                  if (typeof puter === 'undefined') throw new Error('Puter.js not loaded');
                  const resp = await puter.ai.chat(`Keep your answer to two sentences. You are ${OS.state.aiName}. ${text}`, {model: 'gemini-2.5-flash-lite'});
                  let msg = typeof resp === 'string' ? resp : (resp.text || resp.message?.content || "I have an answer, but I can't read it out loud.");
                  msg = msg.replace(/\*/g, '').replace(/#/g, '');
                  this.speak(msg.substring(0, 250)); OS.notify(`${OS.state.aiName} AI`, msg, 'fas fa-robot');
             } catch(e) { this.speak("I'm sorry, I couldn't reach the AI server right now."); }
        }
    };

    window.onload = () => { OS.init(); OS.AI.init(); };

    </script>
</body>
</html>
